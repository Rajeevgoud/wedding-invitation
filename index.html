<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

<style>

/* ===== BODY BACKGROUND ===== */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    color: #f5d38a;
    background: radial-gradient(circle at top, #3b1d5a, #12071f);
    overflow-x: hidden;
}

/* texture */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://www.transparenttextures.com/patterns/dark-mosaic.png');
    opacity: 0.2;
}

/* particles */
body::after {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(circle, rgba(255,215,0,0.6) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: float 20s linear infinite;
}

@keyframes float {
    from { transform: translateY(0); }
    to { transform: translateY(-200px); }
}

/* ===== HERO ===== */
.hero {
    text-align: center;
    padding: 80px 20px;
}

.hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    margin: 10px 0;
}

/* mandala */
.mandala {
    width: 200px;
    height: 200px;
    margin: 20px auto;
    border-radius: 50%;
    border: 2px solid gold;
    box-shadow: 0 0 30px gold, 0 0 60px rgba(255,215,0,0.5);
    animation: rotate 12s linear infinite;
}

@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

.line {
    width: 120px;
    height: 2px;
    background: gold;
    margin: 20px auto;
}

/* ===== SECTION ===== */
.section {
    text-align: center;
    padding: 60px 20px;
}

.section h2 {
    font-family: 'Playfair Display', serif;
}

/* ===== CARDS ===== */
.card {
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    padding: 20px;
    margin: 20px auto;
    max-width: 350px;
    box-shadow: 0 0 15px rgba(255,215,0,0.2);
}

/* ===== IMAGES ===== */
.img-box {
    border: 3px solid gold;
    border-radius: 15px;
    overflow: hidden;
}

.img-box img {
    width: 100%;
}

/* ===== BUTTON ===== */
.btn {
    padding: 10px 20px;
    background: gold;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    color: black;
    font-weight: bold;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <p>THE WEDDING CELEBRATION</p>

    <div class="mandala"></div>

    <h1>Rajendra & Sushma</h1>

    <div class="line"></div>

    <p>Scroll to explore ↓</p>
</div>

<!-- COUPLE -->
<div class="section">
    <h2>The Couple</h2>

    <div class="card">
        <div class="img-box">
            <img src="groom.jpg">
        </div>
        <h3>Rajendra</h3>
    </div>

    <div class="card">
        <div class="img-box">
            <img src="bride.jpg">
        </div>
        <h3>Sushma</h3>
    </div>
</div>

<!-- EVENTS -->
<div class="section">
    <h2>Celebration Schedule</h2>

    <div class="card">
        <h3>Haldi Ceremony</h3>
        <p>25 Feb - 10:00 AM</p>
        <p>Hyderabad</p>
    </div>

    <div class="card">
        <h3>Wedding Ceremony</h3>
        <p>26 Feb - 11:00 AM</p>
        <p>Function Hall</p>
    </div>

    <div class="card">
        <h3>Reception</h3>
        <p>27 Feb - 9:00 PM</p>
        <p>Hyderabad</p>
    </div>
</div>

<!-- RSVP -->
<div class="section">
    <h2>Confirm Your Presence</h2>
    <button class="btn" onclick="confirmInvite()">Confirm ❤️</button>
</div>

<script>
function confirmInvite() {
    alert("Thank you for confirming ❤️");
}
</script>

</body>
</html>
