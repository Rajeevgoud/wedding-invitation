<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
}

/* ===== INTRO ===== */
#intro {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.invite-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

.ganesha {
    width: 120px;
}

.invite-box h2 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: #7a1c2f;
}

.seal {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: radial-gradient(circle, #ff4d4d, #8b0000);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

/* ===== MAIN CONTENT ===== */
#mainContent {
    display: none;
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
}

/* ===== HERO PAGE ===== */
.hero {
    height: 100vh;
    background: #d8a1b0;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    text-align: center;
    scroll-snap-align: start;
}

.subtitle {
    font-size: 14px;
    letter-spacing: 2px;
    margin-bottom: 20px;
}

/* BIG CIRCLE */
.circle {
    width: 260px;
    height: 260px;
    border-radius: 50%;
    border: 4px solid #ff2e88;
    box-shadow: 0 0 40px #ff2e88;
    margin: 20px 0;
}

/* TITLE */
.title {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
    margin-top: 10px;
}

.line {
    width: 80px;
    height: 3px;
    background: #ff2e88;
    margin: 15px auto;
}

.scroll {
    font-size: 14px;
}

/* ===== IMAGE PAGES ===== */
.section {
    height: 100vh;
    scroll-snap-align: start;
}

.section img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* MOBILE */
@media (max-width:600px){
    .circle {
        width: 70vw;
        height: 70vw;
    }

    .title {
        font-size: 28px;
    }
}

</style>

</head>

<body>

<!-- 🔥 INTRO -->

<div id="intro">
    <div class="invite-box">
        <img src="ganesj.jpg" class="ganesha">
        <h2>Wedding Invitation</h2>
        <div class="seal" onclick="openInvite()">Tap to Open</div>
    </div>
</div>

<!-- 🔥 MAIN -->

<div id="mainContent">

```
<!-- ✅ HERO PAGE -->
<div class="hero">

    <div class="subtitle">THE WEDDING CELEBRATION</div>

    <div class="circle"></div>

    <div class="title">Pradeep & Divya</div>

    <div class="line"></div>

    <div class="scroll">Scroll to explore ↓</div>

</div>

<!-- ✅ PAGE 2 -->
<div class="section">
    <img src="page2.jpg">
</div>

<!-- ✅ PAGE 3 -->
<div class="section">
    <img src="page3.jpg">
</div>
```

</div>

<script>
function openInvite() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
}
</script>

</body>
</html>
