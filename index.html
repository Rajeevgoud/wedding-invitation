<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pradeep & Divya Wedding Invitation</title>

<!-- ✅ WhatsApp Preview -->
<meta property="og:title" content="Pradeep & Divya Wedding Invitation">
<meta property="og:description" content="Pradeep & Divya Wedding Invitation">
<meta property="og:image" content="https://rajeevgoud.github.io/wedding-invitation/page1.jpg">
<meta property="og:url" content="https://rajeevgoud.github.io/wedding-invitation/">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    scroll-behavior: smooth;
    overflow-x: hidden;
}

/* ===== INTRO SCREEN ===== */
#intro {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.invite-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

.ganesha {
    width: 120px;
}

.invite-box h2 {
    font-family: 'Playfair Display', serif;
    color: #7a1c2f;
}

/* 🔴 TAP BUTTON */
.seal {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ff4d4d, #8b0000);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-family: 'Playfair Display', serif;
    cursor: pointer;
    box-shadow: inset 0 0 15px rgba(0,0,0,0.5), 0 10px 25px rgba(0,0,0,0.4);
}

/* ===== MAIN ===== */
#mainContent {
    display: none;
}

/* FULL PAGE SECTIONS */
.section {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* HERO SECTION */
.hero {
    background: #d8a1b0;
    flex-direction: column;
}

.circle {
    width: 250px;
    height: 250px;
    border-radius: 50%;
    overflow: hidden;
    border: 4px solid #ff2e88;
    box-shadow: 0 0 30px #ff2e88;
}

.circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.title {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
    margin-top: 20px;
}

.scroll-text {
    margin-top: 10px;
    font-size: 14px;
}

/* IMAGE PAGES */
.page-img {
    width: 100%;
    height: 100vh;
    object-fit: cover;
}

/* MOBILE */
@media (max-width: 600px) {
    .circle {
        width: 90vw;
        height: 90vw;
    }
}

</style>
</head>

<body>

<!-- 🔥 INTRO -->
<div id="intro">
    <div class="invite-box">
        <img src="ganesj.jpg" class="ganesha">
        <h2>Wedding Invitation</h2>

        <div class="seal" onclick="openInvite()">
            Tap to<br>Open
        </div>
    </div>
</div>

<!-- 🔥 MAIN -->
<div id="mainContent">

    <!-- 🎵 MUSIC -->
    <audio id="music" src="song.mp3" loop></audio>

    <!-- PAGE 1 -->
    <div class="section hero">
        <div>THE WEDDING CELEBRATION</div>

        <div class="circle">
            <img src="photo.jpg">
        </div>

        <div class="title">Pradeep & Divya</div>

        <div class="scroll-text">Scroll to explore ↓</div>
    </div>

    <!-- PAGE 2 -->
    <div class="section">
        <img src="page1.jpg" class="page-img">
    </div>

    <!-- PAGE 3 -->
    <div class="section">
        <img src="page2.jpg" class="page-img">
    </div>

    <!-- PAGE 4 -->
    <div class="section">
        <img src="page3.jpg" class="page-img">
    </div>

</div>

<!-- SCRIPT -->
<script>
function openInvite() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("mainContent").style.display = "block";

    // autoplay music
    document.getElementById("music").play();
}
</script>

</body>
</html>
