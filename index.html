<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #d8a1b0;
    text-align: center;
    color: #5a2a3a;
}

/* ===== MAIN SECTION ===== */
.hero {
    min-height: 100vh;
    padding: 40px 20px;
}

/* ===== CIRCLE ===== */
.circle {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    overflow: hidden;
    margin: 20px auto;

    border: 4px solid #ff2e88;
    box-shadow: 0 0 30px #ff2e88;

    position: relative;
}

/* ===== IMAGE ===== */
.circle img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ===== TEXT ===== */
.subtitle {
    font-size: 14px;
    letter-spacing: 2px;
}

.title {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
    margin: 15px 0;
}

.line {
    width: 60px;
    height: 2px;
    background: #ff2e88;
    margin: 10px auto;
}

.scroll {
    font-size: 14px;
    margin-top: 10px;
}

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 600px) {

    .circle {
        width: 75vw;   /* 🔥 responsive width */
        height: 75vw;  /* same = perfect circle */
        max-width: 350px;
        max-height: 350px;
    }

    .title {
        font-size: 36px;   /* bigger name */
    }

    .subtitle {
        font-size: 18px;
        letter-spacing: 3px;
    }

    .line {
        width: 100px;
        height: 3px;
    }

    .scroll {
        font-size: 18px;
    }

}

</style>
</head>

<body>

<div class="hero">

    <div class="subtitle">THE WEDDING CELEBRATION</div>

    <!-- 🔥 IMAGE INSIDE CIRCLE -->
    <div class="circle">
        <!-- ✅ MAKE SURE FILE NAME MATCHES -->
        <img src="photo.jpg" alt="Couple Photo">
    </div>

    <div class="title">Pradeep & Divya</div>

    <div class="line"></div>

    <div class="scroll">Scroll to explore ↓</div>

</div>

</body>
</html>
