<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    background: #d8a1b0;
}

/* ===== INTRO SCREEN ===== */
#intro {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: linear-gradient(#f5e6b3, #e6c86e);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.invite-box {
    text-align: center;
}

/* 🛕 GANESHA */
.ganesha {
    width: 140px;
    margin-bottom: 20px;
}

/* TITLE */
.invite-box h2 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: #7a1c2f;
    margin-bottom: 30px;
}

/* 🔥 REAL WAX SEAL */
.seal {
    position: relative;
    width: 120px;
    height: 120px;

    background: radial-gradient(circle at 30% 30%, #ff4d4d, #8b0000);

    clip-path: polygon(
        50% 0%, 60% 5%, 70% 0%, 80% 8%, 90% 20%,
        100% 30%, 95% 50%, 100% 70%, 90% 80%,
        80% 92%, 65% 100%, 50% 95%, 35% 100%,
        20% 92%, 10% 80%, 0% 70%, 5% 50%,
        0% 30%, 10% 20%, 20% 8%, 30% 0%, 40% 5%
    );

    display: flex;
    justify-content: center;
    align-items: center;

    color: white;
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    line-height: 1.3;
    text-align: center;

    cursor: pointer;

    box-shadow:
        inset 0 0 12px rgba(0,0,0,0.5),
        0 8px 20px rgba(0,0,0,0.4);

    transition: 0.3s;
}

.seal:hover {
    transform: scale(1.1);
}

/* shine effect */
.seal::after {
    content: "";
    position: absolute;
    width: 40%;
    height: 40%;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    top: 20%;
    left: 20%;
}

/* ===== MAIN CONTENT ===== */
.hero {
    min-height: 100vh;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* IMAGE CIRCLE */
.circle {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    overflow: hidden;
    margin: 20px auto;
    border: 4px solid #ff2e88;
    box-shadow: 0 0 30px #ff2e88;
}

.circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* TEXT */
.subtitle {
    font-size: 14px;
    letter-spacing: 2px;
}

.title {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
}

.line {
    width: 60px;
    height: 2px;
    background: #ff2e88;
    margin: 10px auto;
}

/* MOBILE */
@media (max-width: 600px) {
    .circle {
        width: 90vw;
        height: 90vw;
    }
}

</style>
</head>

<body>

<!-- 🔥 INTRO -->
<div id="intro">
    <div class="invite-box">

        <img src="ganesha.png" class="ganesha">

        <h2>Wedding Invitation</h2>

        <div class="seal" onclick="openInvite()">
            Tap to<br>Open
        </div>

    </div>
</div>

<!-- 🔥 MAIN PAGE -->
<div id="mainContent" style="display:none;">

    <div class="hero">

        <div class="subtitle">THE WEDDING CELEBRATION</div>

        <div class="circle">
            <img src="photo.jpg">
        </div>

        <div class="title">Pradeep & Divya</div>

        <div class="line"></div>

    </div>

</div>

<!-- SCRIPT -->
<script>
function openInvite() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
}
</script>

</body>
</html>
