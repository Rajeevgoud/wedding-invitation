<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<style>

/* ===== BODY ===== */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    scroll-behavior: smooth;
}

/* ===== INTRO SCREEN ===== */
#intro {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.invite-box {
    text-align: center;
}

/* GANESH IMAGE */
.ganesh {
    width: 120px;
    margin-bottom: 20px;
}

/* TITLE */
.invite-box h2 {
    font-size: 28px;
    color: #7a1c2f;
}

/* 🔴 WAX BUTTON */
.seal {
    margin-top: 30px;
    width: 120px;
    height: 120px;

    background: radial-gradient(circle, #ff3b3b, #8b0000);

    clip-path: polygon(
        50% 0%, 60% 5%, 70% 0%, 80% 8%, 90% 20%,
        100% 30%, 95% 50%, 100% 70%, 90% 80%,
        80% 92%, 65% 100%, 50% 95%, 35% 100%,
        20% 92%, 10% 80%, 0% 70%, 5% 50%,
        0% 30%, 10% 20%, 20% 8%, 30% 0%, 40% 5%
    );

    display: flex;
    justify-content: center;
    align-items: center;

    color: white;
    font-size: 16px;
    text-align: center;

    cursor: pointer;

    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* ===== MAIN CONTENT ===== */
#mainContent {
    display: none;
}

/* EACH PAGE */
.section {
    height: 100vh;
    width: 100%;
}

/* IMAGE FULL SCREEN */
.section img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* MOBILE FIX */
@media (max-width:600px) {
    .seal {
        width: 110px;
        height: 110px;
    }
}

</style>
</head>

<body>

<!-- 🔥 INTRO SCREEN -->
<div id="intro">
    <div class="invite-box">

        <img src="ganesh.jpg" class="ganesh">

        <h2>Wedding Invitation</h2>

        <div class="seal" onclick="openInvite()">
            Tap to<br>Open
        </div>

    </div>
</div>

<!-- 🔥 MAIN CONTENT -->
<div id="mainContent">

    <!-- ✅ FIRST PAGE (YOUR IMAGE) -->
    <div class="section">
        <img src="page1.jpg">
    </div>

    <!-- ✅ SECOND PAGE -->
    <div class="section">
        <img src="page2.jpg">
    </div>

    <!-- ✅ THIRD PAGE -->
    <div class="section">
        <img src="page3.jpg">
    </div>

</div>

<!-- SCRIPT -->
<script>
function openInvite() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
}
</script>

</body>
</html>
