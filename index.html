<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    background: #d8a1b0;
}

/* ===== INTRO SCREEN ===== */
#intro {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.invite-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
}

.ganesha {
    width: 120px;
}

/* TITLE */
.invite-box h2 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: #7a1c2f;
}

/* BUTTON */
.seal {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ff4d4d, #8b0000);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    cursor: pointer;
    box-shadow: inset 0 0 15px rgba(0,0,0,0.5), 0 10px 25px rgba(0,0,0,0.4);
}

/* ===== MAIN CONTENT (SCROLL ENABLED) ===== */
#mainContent {
    display: none;
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
}

/* ===== EACH PAGE ===== */
.section {
    height: 100vh;
    scroll-snap-align: start;
}

/* ===== HERO PAGE ===== */
.hero {
    background: #d8a1b0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* IMAGE CIRCLE */
.circle {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    overflow: hidden;
    margin: 20px auto;
    border: 4px solid #ff2e88;
    box-shadow: 0 0 30px #ff2e88;
}

.circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* TEXT */
.subtitle {
    font-size: 14px;
    letter-spacing: 2px;
}

.title {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
}

.line {
    width: 60px;
    height: 2px;
    background: #ff2e88;
    margin: 10px auto;
}

/* IMAGE FULL PAGE */
.section img {
    width: 100%;
    height: 100%;
    object-fit: contain;   /* ✅ FIX */
}

/* MOBILE */
@media (max-width: 600px) {
    .circle {
        width: 90vw;
        height: 90vw;
    }
}

</style>

</head>

<body>

<!-- 🔥 INTRO -->

<div id="intro">
    <div class="invite-box">
        <img src="./ganesj.jpg" class="ganesha">
        <h2>Wedding Invitation</h2>
        <div class="seal" onclick="openInvite()">
            Tap to<br>Open
        </div>
    </div>
</div>

<!-- 🔥 MAIN CONTENT -->

<div id="mainContent">

```
<!-- ✅ PAGE 1 (YOUR HERO PAGE) -->
<div class="section hero">
    <div class="subtitle">THE WEDDING CELEBRATION</div>

    <div class="circle">
        <img src="photo.jpg">
    </div>

    <div class="title">Pradeep & Divya</div>
    <div class="line"></div>
</div>

<!-- ✅ PAGE 2 (ADD YOUR IMAGE) -->
<div class="section">
    <img src="page1.jpg">
</div>

<!-- ✅ PAGE 3 (ADD YOUR IMAGE) -->
<div class="section">
    <img src="page2.jpg">
</div>
```

</div>

<script>
function openInvite() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
}
</script>

</body>
</html>
