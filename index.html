<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
}

/* ===== INTRO SCREEN ===== */
#intro {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: #ffffff;

    display: flex;
    justify-content: center;
    align-items: center;

    z-index: 999;
}

/* CENTER */
.invite-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

.ganesha {
    width: 120px;
}

.invite-box h2 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: #7a1c2f;
}

/* BUTTON */
.seal {
    width: 130px;
    height: 130px;
    border-radius: 50%;

    background: radial-gradient(circle, #ff4d4d, #8b0000);

    display: flex;
    justify-content: center;
    align-items: center;

    color: white;
    font-size: 18px;

    cursor: pointer;
}

/* ===== MAIN CONTENT ===== */
#mainContent {
    display: none;
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
}

/* EACH PAGE */
.section {
    height: 100vh;
    scroll-snap-align: start;
}

/* FULL IMAGE */
.section img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* MOBILE */
@media (max-width:600px){
    .seal {
        width: 110px;
        height: 110px;
        font-size: 16px;
    }

    .ganesha {
        width: 100px;
    }
}

</style>

</head>

<body>

<!-- 🔥 INTRO -->

<div id="intro">
    <div class="invite-box">

```
    <img src="ganesj.jpg" class="ganesha">

    <h2>Wedding Invitation</h2>

    <div class="seal" onclick="openInvite()">
        Tap to Open
    </div>

</div>
```

</div>

<!-- 🔥 MAIN CONTENT -->

<div id="mainContent">

```
<!-- ✅ PAGE 1 -->
<div class="section">
    <img src="page2.jpg">
</div>

<!-- ✅ PAGE 2 -->
<div class="section">
    <img src="page3.jpg">
</div>
```

</div>

<script>
function openInvite() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
}
</script>

</body>
</html>
