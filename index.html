<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="Pradeep & Divya Wedding Invitation">
<meta property="og:description" content="You are invited to celebrate our wedding">
<meta property="og:image" content="https://rajeevgoud.github.io/wedding-invitation/page1.jpg">
<meta property="og:url" content="https://rajeevgoud.github.io/wedding-invitation/">

<!-- EXTRA (helps WhatsApp) -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Wedding Invitation">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    background: #d8a1b0;
}

/* ===== INTRO SCREEN ===== */
#intro {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.invite-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

.ganesha {
    width: 120px;
}

/* TITLE */
.invite-box h2 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: #7a1c2f;
}

/* BUTTON */
.seal {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ff4d4d, #8b0000);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    cursor: pointer;
    box-shadow: inset 0 0 15px rgba(0,0,0,0.5), 0 10px 25px rgba(0,0,0,0.4);
}

/* ===== MAIN CONTENT ===== */
#mainContent {
    display: none;
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
}

/* EACH PAGE */
.section {
    height: 100vh;
    scroll-snap-align: start;
}

/* HERO PAGE */
.hero {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* IMAGE CIRCLE */
.circle {
    display: flex;
    justify-content: center;
    align-items: center;
    background: #d8a1b0;
}

.circle img {
    width: 85%;
    height: 85%;
    object-fit: contain;
    border-radius: 50%;
}

/* TEXT */
.subtitle {
    font-size: 14px;
    letter-spacing: 2px;
}

.title {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
}

.line {
    width: 60px;
    height: 2px;
    background: #ff2e88;
    margin: 10px auto;
}

.scroll {
    font-size: 14px;
    margin-top: 10px;
}

/* FULL IMAGE PAGES */
.section img {
    width: 100%;
    height: 100%;
    object-fit: contain; /* prevents cutting */
}

/* MOBILE */
@media (max-width: 600px) {
    .circle {
        width: 90vw;
        height: 90vw;
    }
}

</style>

</head>

<body>

<!-- 🔥 INTRO -->

<div id="intro">
    <div class="invite-box">
        <img src="ganesj.jpg" class="ganesha">
        <h2>Wedding Invitation</h2>
        <div class="seal" onclick="openInvite()">Tap to Open</div>
    </div>
</div>

<!-- 🔥 MAIN CONTENT -->

<div id="mainContent">

```
<!-- PAGE 1 -->
<div class="section hero">
    <div class="subtitle">THE WEDDING CELEBRATION</div>

    <div class="circle">
        <img src="photo.jpg">
    </div>

    <div class="title">Pradeep & Divya</div>
    <div class="line"></div>
    <div class="scroll">Scroll down ↓</div>
</div>

<!-- PAGE 2 -->
 <!-- PAGE 2 -->
    <div class="section">
        <img src="page1.jpg">
    </div>

    <!-- PAGE 3 -->
    <div class="section">
        <img src="page2.jpg">
    </div>

    <!-- PAGE 4 (NEW) -->
    <div class="section">
        <img src="page3.jpg">
    </div>
    
```

</div>

<!-- 🎵 MUSIC -->

<audio id="music" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- SCRIPT -->

<script>
function openInvite() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("mainContent").style.display = "block";

    // ▶️ Play music
    document.getElementById("music").play();
}
</script>

</body>
</html>
